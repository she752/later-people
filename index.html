安排"]

  var COLOR_PALETTE = ["#b45f2a","#7f5b3b","#8b5a2b","#a0522d","#6b4f3c","#9c6e4b","#5d4037","#8d6e63","#a67c52","#7b5e3b","#b76e4b","#6d4c3d"];
  var currentRound = 1, answers = [], finalIdentity = "", finalDesc = "", messages = [];

  function loadMessages() {
    fetch(API_URL, { headers: { "Authorization": "token " + TOKEN } })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        try { messages = JSON.parse(atob(data.content)) || []; } catch(e) { messages = []; }
        renderWall();
      })
      .catch(function() { messages = []; renderWall(); });
  }

  function saveMessages() {
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(messages))));
    fetch(API_URL, {
      method: "PUT",
      headers: { "Authorization": "token " + TOKEN, "Content-Type": "application/json" },
      body: JSON.stringify({ message: "update", content: content, sha: window._lastSha || "" })
    }).then(function(r) { return r.json(); })
      .then(function(data) { window._lastSha = data.content.sha; })
      .catch(function() {});
  }

  function getColor(idx) { return COLOR_PALETTE[idx % COLOR_PALETTE.length]; }

  function renderWall() {
    var mc = document.getElementById('messageContainer');
    if (!mc) return;
    mc.innerHTML = '';
    if (messages.length === 0) { mc.innerHTML = '<div class="empty-message">🌱 等待后来人发声</div>'; return; }
    var reversed = messages.slice().reverse();
    reversed.forEach(function(msg, idx) {
      var div = document.createElement('div'); div.className = 'message-item';
      var color = getColor(idx); div.style.borderLeftColor = color; div.style.color = color;
      var idSpan = document.createElement('div'); idSpan.className = 'message-identity';
      idSpan.textContent = '🆔 ' + (msg.identity || '后来人'); idSpan.style.color = color;
      var textSpan = document.createElement('span'); textSpan.className = 'message-content';
      textSpan.textContent = msg.text;
      div.appendChild(idSpan); div.appendChild(textSpan);
      mc.appendChild(div);
    });
    mc.scrollTop = 0;
  }

  function spawnBubble(text) {
    var bubble = document.createElement('div'); bubble.className = 'bubble-fly'; bubble.textContent = text;
    var r = document.getElementById('userMessage').getBoundingClientRect();
    bubble.style.left = (r.left + r.width/2 - 100) + 'px'; bubble.style.top = (r.top - 10) + 'px';
    bubble.style.position = 'fixed'; document.body.appendChild(bubble);
    bubble.addEventListener('animationend', function() { if (bubble.parentNode) bubble.parentNode.removeChild(bubble); });
  }

  function triggerGoldenEffect() {
    var gc = document.getElementById('goldenEffectContainer'); gc.innerHTML = '';
    var burst = document.createElement('div'); burst.className = 'golden-burst';
    var t = document.createElement('div'); t.className = 'golden-text-effect'; t.textContent = '薪火相传';
    burst.appendChild(t); gc.appendChild(burst);
    setTimeout(function() { if (gc.contains(burst)) gc.removeChild(burst); }, 850);
    for (var i = 0; i < 18; i++) {
      (function(i) { setTimeout(function() {
        var p = document.createElement('div');
        p.style.cssText = 'position:fixed;width:10px;height:10px;background:#FFC107;border-radius:50%;box-shadow:0 0 30px #FFB300,0 0 55px #FF8F00;pointer-events:none;z-index:1000;animation:goldPulse 0.8s ease-out forwards;';
        p.style.left = Math.random()*100+'%'; p.style.top = Math.random()*100+'%'; gc.appendChild(p);
        setTimeout(function() { if(gc.contains(p)) gc.removeChild(p); }, 750);
      }, i*22); })(i);
    }
  }

  function handleSend() {
    var val = document.getElementById('userMessage').value.trim();
    if (!val) return;
    spawnBubble(val);
    messages.push({ identity: finalIdentity, text: val });
    if (messages.length > 60) messages = messages.slice(-60);
    saveMessages();
    renderWall();
    document.getElementById('userMessage').value = '';
    triggerGoldenEffect();
  }

  function updateProgress() {
    ['dot1','dot2','dot3'].forEach(function(id, i) {
      var d = document.getElementById(id); d.classList.remove('active','done');
      if (i < answers.length) d.classList.add('done');
      if (i === answers.length) d.classList.add('active');
    });
  }

  function renderOptions(options) {
    var oc = document.getElementById('optionsContainer'); oc.innerHTML = '';
    options.forEach(function(opt) {
      var btn = document.createElement('button'); btn.className = 'option-btn';
      btn.innerHTML = '<span class="option-letter">' + opt.key + '</span>' + opt.text;
      btn.addEventListener('click', function() { handleOptionClick(opt.key); });
      oc.appendChild(btn);
    });
  }

  function handleOptionClick(key) {
    answers.push(key); updateProgress();
    if (currentRound === 1) { currentRound = 2; var r2 = questions.round2[answers[0]]; document.getElementById('questionTitle').textContent = r2.title; renderOptions(r2.options); }
    else if (currentRound === 2) { currentRound = 3; var r3 = questions.round3[answers[0]+answers[1]]; document.getElementById('questionTitle').textContent = r3.title; renderOptions(r3.options); }
    else if (currentRound === 3) { var code = answers.join(''); var data = identityMap[code] || ["后来人","薪火相传，接力前行"]; finalIdentity = data[0]; finalDesc = data[1]; showResult(); }
  }

  function showResult() {
    document.getElementById('questionTitle').style.display = 'none';
    document.getElementById('optionsContainer').style.display = 'none';
    document.getElementById('progressBar').style.display = 'none';
    var rc = document.getElementById('resultContainer'); rc.classList.remove('hidden');
    rc.innerHTML = '<h3 style="color:#5e3e1a;margin-bottom:8px;">🎉 你的专属身份</h3><div class="identity-badge">'+finalIdentity+'</div><div class="identity-desc">'+finalDesc+'</div><button class="jump-btn" id="jumpToWallBtn">✨ 进入寄语墙 ✨</button>';
    document.getElementById('jumpToWallBtn').addEventListener('click', jumpToWall);
  }

  function jumpToWall() {
    document.getElementById('selectionPage').classList.add('hidden');
    document.getElementById('wallPage').classList.remove('hidden');
    document.getElementById('currentIdentityDisplay').textContent = '🌟 你的身份：' + finalIdentity;
    loadMessages();
  }

  function resetSelection() {
    currentRound = 1; answers = []; finalIdentity = ""; finalDesc = "";
    document.getElementById('questionTitle').style.display = '';
    document.getElementById('optionsContainer').style.display = '';
    document.getElementById('progressBar').style.display = '';
    document.getElementById('resultContainer').classList.add('hidden');
    document.getElementById('resultContainer').innerHTML = '';
    document.getElementById('questionTitle').textContent = questions.round1.title;
    renderOptions(questions.round1.options); updateProgress();
  }

  document.getElementById('startSelectionBtn').addEventListener('click', function() {
    document.getElementById('coverPage').classList.add('hidden');
    document.getElementById('selectionPage').classList.remove('hidden');
    resetSelection();
  });

  document.getElementById('sendButton').addEventListener('click', handleSend);
  document.getElementById('userMessage').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });

  function createSparks() {
    var layer = document.getElementById('sparkLayer'); if (!layer) return; layer.innerHTML = '';
    for (var i = 0; i < 32; i++) {
      var s = document.createElement('div'); s.className = 'spark';
      var size = Math.random()*7+3; s.style.width = size+'px'; s.style.height = size+'px';
      s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
      s.style.animationDelay = Math.random()*12+'s'; s.style.animationDuration = (Math.random()*9+7)+'s';
      layer.appendChild(s);
    }
  }
  createSparks();

  var quotes = ["✨ 丹心从来系家国 ✨","🌾 躬逢盛世，当不负盛世","🔥 每一束微光，都照亮前路","📖 后来人，即是此刻的我们","🌅 旭日东升，其道大光"];
  var qi = 0, qe = document.getElementById('floatingQuote');
  setInterval(function() { if(!qe) return; qe.style.opacity='0'; setTimeout(function(){ qi=(qi+1)%quotes.length; qe.textContent=quotes[qi]; qe.style.opacity='0.9'; },400); }, 6500);

  questionTitle.textContent = questions.round1.title;
  renderOptions(questions.round1.options);
  updateProgress();

  fetch(API_URL, { headers: { "Authorization": "token " + TOKEN } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      window._lastSha = data.sha;
      try { messages = JSON.parse(atob(data.content)) || []; } catch(e) { messages = []; }
      renderWall();
    })
    .catch(function() { messages = []; renderWall(); });

  setInterval(function() { loadMessages(); }, 3000);
})();
</script>
